<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QA Skill Check</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page">

  <header>
    <div class="container">
      <nav class="site-header">
        <a class="logo" href="index.html">
          <img src="logo.png" alt="Starapps Studio" class="site-logo" />
        </a>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-3);letter-spacing:1px;text-transform:uppercase;">QA Skill Check</span>
      </nav>
    </div>
  </header>

  <main style="padding: 56px 0 80px;">
    <div class="container">

      <div style="margin-bottom:32px;" class="animate-in">
        <h1 style="font-family:var(--font-display);font-size:clamp(32px,5vw,48px);font-weight:800;letter-spacing:-2px;margin-bottom:10px;">
          7 domains. 10 min each.<br /><span style="color:var(--lime);">Prove your QA skills.</span>
        </h1>
        <p style="color:var(--text-2);font-size:15px;">Fill in your details to begin.</p>
      </div>

      <div class="card animate-in delay-1">
        <form id="registrationForm" novalidate>
          <div class="form-grid">

            <div class="form-group">
              <label for="fullName">Full Name <span class="required">*</span></label>
              <input type="text" id="fullName" name="fullName" placeholder="Jane Smith" required autocomplete="name" />
            </div>

            <div class="form-group">
              <label for="email">Email <span class="required">*</span></label>
              <input type="email" id="email" name="email" placeholder="jane@company.com" required autocomplete="email" />
            </div>

            <div class="form-group">
              <label for="experience">Years of Experience <span class="required">*</span></label>
              <select id="experience" name="experience" required>
                <option value="" disabled selected>Select range</option>
                <option value="0-1">Less than 1 year</option>
                <option value="1-3">1 – 3 years</option>
                <option value="3-5">3 – 5 years</option>
                <option value="5-10">5 – 10 years</option>
                <option value="10+">10+ years</option>
              </select>
            </div>

            <div class="form-group">
              <label for="role">Current Role <span class="required">*</span></label>
              <select id="role" name="role" required>
                <option value="" disabled selected>Select role</option>
                <option value="manual-qa">Manual QA Engineer</option>
                <option value="sdet">SDET / Automation Engineer</option>
                <option value="qa-lead">QA Lead / Manager</option>
                <option value="qa-analyst">QA Analyst</option>
                <option value="devops-qa">DevOps / Platform QA</option>
                <option value="freelance">Freelance QA</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="form-group">
              <label for="domain">Primary Domain <span class="required">*</span></label>
              <select id="domain" name="domain" required>
                <option value="" disabled selected>Select domain</option>
                <option value="web">Web Applications</option>
                <option value="mobile">Mobile (iOS / Android)</option>
                <option value="api">API / Microservices</option>
                <option value="backend">Back-End / Data</option>
                <option value="ai-ml">AI / ML Systems</option>
                <option value="embedded">Embedded / Hardware</option>
                <option value="mixed">Mixed / Full-Stack</option>
              </select>
            </div>

            <div class="form-group">
              <label for="linkedin">LinkedIn <span style="color:var(--text-3);font-weight:400;">(optional)</span></label>
              <input type="text" id="linkedin" name="linkedin" placeholder="linkedin.com/in/yourhandle" autocomplete="off" />
            </div>

          </div>

          <div id="formError" class="notice notice-danger" style="display:none;margin-top:16px;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <span id="formErrorMsg">Please fill in all required fields.</span>
          </div>

          <button type="submit" class="btn btn-primary btn-lg btn-full" id="startBtn" style="margin-top:20px;">
            Start Assessment →
          </button>
        </form>
      </div>

    </div>
  </main>

  <footer>
    <div class="container">
      <img src="logo.png" alt="Starapps Studio" style="height:18px;filter:brightness(0) invert(1);opacity:0.3;vertical-align:middle;margin-right:10px;" />
      © 2025 · QA Skill Check
    </div>
  </footer>

</div>

<script>
  document.getElementById('registrationForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const fields = ['fullName', 'email', 'experience', 'role', 'domain'];
    let valid = true;

    fields.forEach(id => {
      const el = document.getElementById(id);
      if (!el.value.trim()) { el.style.borderColor = 'var(--red)'; valid = false; }
      else el.style.borderColor = '';
    });

    const emailEl = document.getElementById('email');
    if (emailEl.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
      emailEl.style.borderColor = 'var(--red)'; valid = false;
    }

    if (!valid) {
      const err = document.getElementById('formError');
      err.style.display = 'flex';
      err.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      return;
    }

    document.getElementById('formError').style.display = 'none';

    sessionStorage.setItem('qa_candidate', JSON.stringify({
      fullName:   document.getElementById('fullName').value.trim(),
      email:      document.getElementById('email').value.trim(),
      experience: document.getElementById('experience').value,
      role:       document.getElementById('role').value,
      domain:     document.getElementById('domain').value,
      linkedin:   document.getElementById('linkedin').value.trim(),
      startedAt:  new Date().toISOString()
    }));
    sessionStorage.setItem('qa_responses', JSON.stringify({}));
    sessionStorage.setItem('qa_timings',   JSON.stringify({}));

    const btn = document.getElementById('startBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Loading...';
    setTimeout(() => { window.location.href = 'instructions.html'; }, 400);
  });

  ['fullName','email','experience','role','domain'].forEach(id => {
    document.getElementById(id).addEventListener('input', function () { this.style.borderColor = ''; });
  });
</script>

</body>
</html>
