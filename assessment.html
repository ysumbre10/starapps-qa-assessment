<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assessment - QA Skill Check</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page">

  <header>
    <div class="container">
      <nav class="site-header">
        <a class="logo" href="index.html">
          <img src="logo.png" alt="Starapps Studio" class="site-logo" />
        </a>
        <span id="headerCandidate" style="font-family:var(--font-mono);font-size:11px;color:var(--text-3);"></span>
      </nav>
    </div>
  </header>

  <!-- Sticky progress -->
  <div class="progress-bar-wrap">
    <div class="container">
      <div class="progress-info">
        <span class="progress-label" id="progressLabel">Domain 1 of 10</span>
        <span class="progress-count" id="progressDomain"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- Sticky timer strip: slides in when the main timer scrolls out of view -->
  <div id="stickyTimerStrip" class="sticky-timer-strip">
    <div class="container">
      <div class="sticky-timer-inner">
        <span class="sticky-domain-label" id="stickyDomain"></span>
        <div class="sticky-timer-right">
          <span class="sticky-timer-display" id="stickyTimerDisplay">10:00</span>
          <span class="sticky-timer-unit">left</span>
        </div>
      </div>
    </div>
  </div>

  <main style="padding:24px 0 64px;">
    <div class="container">

      <!-- Timer -->
      <div class="timer-wrap">
        <div style="text-align:center;">
          <div class="timer-label">Time Remaining</div>
          <div class="timer-display" id="timerDisplay">10:00</div>
        </div>
        <div class="timer-ring">
          <svg viewBox="0 0 60 60" width="60" height="60">
            <circle class="timer-ring-bg" cx="30" cy="30" r="26"/>
            <circle class="timer-ring-progress" id="timerRing" cx="30" cy="30" r="26"/>
          </svg>
        </div>
        <div style="text-align:center;">
          <div class="timer-label">Auto-submits at</div>
          <div id="autoSubmitAt" style="font-family:var(--font-mono);font-size:17px;font-weight:700;color:var(--text-2);">—</div>
        </div>
      </div>

      <div id="autosubmitNotice" class="autosubmit-notice" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Under 2 minutes. Auto-submitting when timer hits zero.
      </div>

      <!-- Assessment card -->
      <div id="assessmentCard">
        <div style="margin-bottom:20px;">
          <div class="task-domain-badge" id="domainBadge">Domain</div>
          <h1 id="domainTitle" style="font-family:var(--font-display);font-size:24px;font-weight:800;letter-spacing:-0.5px;margin-top:8px;"></h1>
        </div>

        <!-- MCQ section -->
        <div id="mcqSectionHeader" class="section-header">
          <div class="section-icon mcq-icon">MCQ</div>
          <div>
            <div class="section-title">Multiple Choice</div>
            <div class="section-sub">Select the best answer for each question.</div>
          </div>
        </div>
        <div id="mcqContainer"></div>

        <!-- Tasks section -->
        <div id="taskSectionHeader" class="section-header" style="margin-top:28px;">
          <div class="section-icon task-icon">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div>
            <div class="section-title">Open Tasks</div>
            <div class="section-sub">Write your answer in the text area.</div>
          </div>
        </div>
        <div id="taskContainer"></div>

        <div id="submitRow" style="display:flex;align-items:center;gap:14px;margin-top:24px;flex-wrap:wrap;">
          <button class="btn btn-primary btn-lg" id="submitBtn" style="flex:1;min-width:200px;">
            Submit &amp; Next Domain →
          </button>
          <div style="font-size:12px;color:var(--text-3);font-family:var(--font-mono);">Saved on submit</div>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <div class="container">
      <img src="logo.png" alt="Starapps Studio" style="height:18px;filter:brightness(0) invert(1);opacity:0.3;vertical-align:middle;margin-right:10px;" />
      © 2025 · QA Skill Check
    </div>
  </footer>

</div>

<script src="config.js"></script>
<script src="assessment.js"></script>
</body>
</html>
