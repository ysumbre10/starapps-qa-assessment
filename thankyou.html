<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Done — QA Skill Check</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page">

  <header>
    <div class="container">
      <nav class="site-header">
        <a class="logo" href="index.html">
          <img src="logo.png" alt="Starapps Studio" class="site-logo" />
        </a>
      </nav>
    </div>
  </header>

  <main style="padding:64px 0 80px;">
    <div class="container">

      <div class="thankyou-hero animate-in">
        <div class="check-circle">✓</div>
        <h1>Done.</h1>
        <p>Answers recorded. MCQ scores below — open tasks are AI-evaluated and reviewed by our team.</p>
      </div>

      <div class="summary-grid animate-in delay-1">
        <div class="summary-stat">
          <div class="stat-num" id="statMcq">—</div>
          <div class="stat-label">MCQ / 21</div>
        </div>
        <div class="summary-stat">
          <div class="stat-num" id="statDomains">—</div>
          <div class="stat-label">Domains Done</div>
        </div>
        <div class="summary-stat">
          <div class="stat-num" id="statAvgTime">—</div>
          <div class="stat-label">Avg per Domain</div>
        </div>
      </div>

      <div class="card animate-in delay-2" style="margin-bottom:16px;">
        <div id="scoreBreakdown"></div>
      </div>

      <div class="card card-sm animate-in delay-3" style="text-align:center;margin-bottom:40px;">
        <a id="shareBtn" href="#" target="_blank" rel="noopener noreferrer" class="btn btn-ghost">
          Share on LinkedIn
        </a>
      </div>

    </div>
  </main>

  <footer>
    <div class="container">
      <img src="logo.png" alt="Starapps Studio" style="height:18px;filter:brightness(0) invert(1);opacity:0.3;vertical-align:middle;margin-right:10px;" />
      © 2025 · QA Skill Check
    </div>
  </footer>

</div>

<script src="config.js"></script>
<script src="assessment.js"></script>
<script>
  var responses = JSON.parse(sessionStorage.getItem('qa_responses') || '{}');
  var timings   = JSON.parse(sessionStorage.getItem('qa_timings')   || '{}');

  var totalMcq = 0, domainsCompleted = 0, timingValues = [];

  DOMAINS.forEach(function(d) {
    var resp = responses['domain_' + d.id];
    if (resp) { domainsCompleted++; totalMcq += resp.mcqScore || 0; }
    var t = timings['domain_' + d.id + '_secs'];
    if (t) timingValues.push(t);
  });

  var avgSecs = timingValues.length ? Math.round(timingValues.reduce(function(a,b){return a+b;}, 0) / timingValues.length) : 0;
  document.getElementById('statMcq').textContent     = `${totalMcq}/21`;
  document.getElementById('statDomains').textContent = `${domainsCompleted}/7`;
  document.getElementById('statAvgTime').textContent = `${Math.floor(avgSecs/60)}m${String(avgSecs%60).padStart(2,'0')}s`;

  var el = document.getElementById('scoreBreakdown');
  DOMAINS.forEach(function(d) {
    var resp  = responses['domain_' + d.id];
    var row   = document.createElement('div');
    row.className = 'score-row';
    var score = (resp && resp.mcqScore != null) ? resp.mcqScore : null;
    row.innerHTML =
      '<div class="score-domain">' + d.domain + '</div>' +
      '<div class="score-badges">' +
        (score !== null
          ? '<span class="mcq-score-badge' + (score === 3 ? ' perfect' : '') + '">' + score + '/3 MCQ</span><span class="ai-pending">tasks · AI review</span>'
          : '<span class="ai-pending">Not attempted</span>') +
      '</div>';
    el.appendChild(row);
  });

  var shareText = encodeURIComponent('I just completed the QA Skill Check by Starapps Studio — 7 real-world domains. Think you can beat my score?');
  document.getElementById('shareBtn').href = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(window.location.origin + '/index.html') + '&summary=' + shareText;
</script>

</body>
</html>
